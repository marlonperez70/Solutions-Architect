apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-platform
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: enterprise-platform
  template:
    metadata:
      labels:
        app: enterprise-platform
    spec:
      containers:
      - name: frontend
        image: enterprise-platform:frontend-latest
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
      - name: backend
        image: enterprise-platform:backend-latest
        ports:
        - containerPort: 3001
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: url
        resources:
          requests:
            memory: "1Gi"
            cpu: "1000m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-platform-service
  namespace: production
spec:
  type: LoadBalancer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
    name: http
  - protocol: TCP
    port: 443
    targetPort: 3000
    name: https
  selector:
    app: enterprise-platform

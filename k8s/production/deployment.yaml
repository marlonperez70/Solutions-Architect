apiVersion: v1
kind: Namespace
metadata:
  name: enterprise-platform

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: enterprise-platform
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  CACHE_TTL: "3600"

---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: enterprise-platform
type: Opaque
stringData:
  DATABASE_URL: "mysql://user:password@mysql:3306/enterprise"
  JWT_SECRET: "your-secret-key-here"
  OAUTH_CLIENT_ID: "your-oauth-client-id"
  OAUTH_CLIENT_SECRET: "your-oauth-client-secret"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-platform-backend
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: backend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: enterprise-platform
      component: backend
  template:
    metadata:
      labels:
        app: enterprise-platform
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      serviceAccountName: enterprise-platform
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      
      containers:
      - name: backend
        image: ghcr.io/marlonperez70/enterprise-platform/backend:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: DATABASE_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-platform-frontend
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: enterprise-platform
      component: frontend
  template:
    metadata:
      labels:
        app: enterprise-platform
        component: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/marlonperez70/enterprise-platform/frontend:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 80
          protocol: TCP
        
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: billing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-platform
      component: billing
  template:
    metadata:
      labels:
        app: enterprise-platform
        component: billing
    spec:
      containers:
      - name: billing
        image: ghcr.io/marlonperez70/enterprise-platform/ms-billing:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8004
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: inventory
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enterprise-platform
      component: inventory
  template:
    metadata:
      labels:
        app: enterprise-platform
        component: inventory
    spec:
      containers:
      - name: inventory
        image: ghcr.io/marlonperez70/enterprise-platform/ms-inventory:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8005
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-server
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: enterprise-platform
      component: mcp
  template:
    metadata:
      labels:
        app: enterprise-platform
        component: mcp
    spec:
      containers:
      - name: mcp-server
        image: ghcr.io/marlonperez70/enterprise-platform/ms-mcp:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8006
        
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-platform-backend
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: backend
spec:
  type: ClusterIP
  selector:
    app: enterprise-platform
    component: backend
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-platform-frontend
  namespace: enterprise-platform
  labels:
    app: enterprise-platform
    component: frontend
spec:
  type: ClusterIP
  selector:
    app: enterprise-platform
    component: frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
    protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
  namespace: enterprise-platform
spec:
  type: ClusterIP
  selector:
    app: enterprise-platform
    component: billing
  ports:
  - name: http
    port: 8004
    targetPort: 8004

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: enterprise-platform
spec:
  type: ClusterIP
  selector:
    app: enterprise-platform
    component: inventory
  ports:
  - name: http
    port: 8005
    targetPort: 8005

---
apiVersion: v1
kind: Service
metadata:
  name: mcp-server
  namespace: enterprise-platform
spec:
  type: ClusterIP
  selector:
    app: enterprise-platform
    component: mcp
  ports:
  - name: http
    port: 8006
    targetPort: 8006

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enterprise-platform-network-policy
  namespace: enterprise-platform
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
  egress:
  - to:
    - namespaceSelector: {}
  - to:
    - podSelector: {}

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enterprise-platform-pdb
  namespace: enterprise-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: enterprise-platform
      component: backend
